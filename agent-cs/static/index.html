<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能客服</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f0f2f5;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 420px; height: 650px;
            background: white; border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 18px 20px;
            font-size: 17px; font-weight: 600;
        }
        .chat-header small { font-weight: 400; opacity: 0.8; font-size: 12px; display: block; margin-top: 4px; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; }
        .msg.bot { background: #f0f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.user { background: #667eea; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.thinking { background: #fff3cd; color: #856404; align-self: flex-start; font-style: italic; }
        .chat-input {
            display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px;
        }
        .chat-input input {
            flex: 1; padding: 10px 14px; border: 1px solid #ddd;
            border-radius: 20px; font-size: 14px; outline: none;
        }
        .chat-input input:focus { border-color: #667eea; }
        .chat-input button {
            padding: 10px 20px; background: #667eea; color: white;
            border: none; border-radius: 20px; cursor: pointer; font-size: 14px;
        }
        .chat-input button:hover { background: #5a6fd6; }
        .chat-input button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            🤖 AI 智能客服
            <small>● 在线 — 7×24小时为您服务</small>
        </div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input">
            <input type="text" id="input" placeholder="请输入您的问题..." autocomplete="off" />
            <button id="sendBtn" onclick="send()">发送</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        // 连接 WebSocket
        const ws = new WebSocket(`ws://${location.host}/ws/chat`);

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            // 移除"正在思考"提示
            const thinkingEl = document.querySelector('.msg.thinking');
            if (thinkingEl) thinkingEl.remove();

            if (data.type === 'thinking') {
                addMessage(data.content, 'thinking');
            } else if (data.type === 'message') {
                addMessage(data.content, 'bot');
            } else if (data.type === 'error') {
                addMessage('⚠️ ' + data.content, 'bot');
            }
            sendBtn.disabled = false;
        };

        ws.onclose = () => addMessage('⚠️ 连接已断开，请刷新页面重试', 'bot');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function send() {
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            ws.send(JSON.stringify({ message: text }));
            input.value = '';
            sendBtn.disabled = true;
        }

        // 回车发送
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
